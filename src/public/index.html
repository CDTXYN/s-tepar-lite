<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S-TEPAR Lite</title>
</head>
<body>
  <h1>S-TEPAR Lite</h1>

  <input type="file" id="fileInput" />
  <button onclick="handleFile()">Run QA Check</button>

  <pre id="output"></pre>

 <script>
  function extractPlaceholders(text) {
    const regex = /{[^}]+}|%[sd]/g;
    return text.match(regex) || [];
  }

  function handleFile() {
    const file = document.getElementById('fileInput').files[0];

    if (!file) {
      alert("Please upload a file.");
      return;
    }
    function calculateExpansion(source, target) {
  if (!source) return 0;
  return ((target.length - source.length) / source.length) * 100;
    }

    const reader = new FileReader();

    reader.onload = function(event) {
      try {
        const content = event.target.result;
        const data = JSON.parse(content);

        const results = [];

        for (const key in data) {
          const source = data[key].source || "";
          const target = data[key].target || "";

          // Missing translation
          if (!target) {
            results.push(`❌ Missing translation for key: ${key}`);
            continue;
          }

          const sourcePH = extractPlaceholders(source);
          const targetPH = extractPlaceholders(target);

          const missing = sourcePH.filter(p => !targetPH.includes(p));
          const extra = targetPH.filter(p => !sourcePH.includes(p));

         const expansion = calculateExpansion(source, target).toFixed(1);

if (!target) {
  results.push(`❌ Missing translation for key: ${key}`);
} else if (missing.length > 0 || extra.length > 0) {
  results.push(`❌ ${key} mismatch → Missing: [${missing}] Extra: [${extra}]`);
} else if (expansion > 30) {
  results.push(`⚠️ ${key} expansion high: ${expansion}%`);
} else if (sourcePH.length > 0) {
  results.push(`⚠️ ${key} placeholders OK: ${sourcePH.join(", ")}`);
} else {
  results.push(`✅ ${key}`);
}
        }
        document.getElementById('output').textContent = results.join('\n');

      } catch (err) {
        document.getElementById('output').textContent = "❌ Invalid JSON format.";
      }
    };

    reader.readAsText(file);
  }
</script>
</body>
</html>
