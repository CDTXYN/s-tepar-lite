<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>S-TEPAR Lite</title>
</head>
<body>
  <h1>S-TEPAR Lite</h1>

  <input type="file" id="fileInput" />
  <button onclick="handleFile()">Run QA Check</button>

  <pre id="output"></pre>

  <style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
  }

  h1 {
    color: #38bdf8;
  }

  button {
    background: #38bdf8;
    border: none;
    padding: 10px 15px;
    color: black;
    cursor: pointer;
    margin-top: 10px;
  }

  pre {
    background: #1e293b;
    padding: 15px;
    margin-top: 20px;
    border-radius: 8px;
  }
</style>

<script>
  function extractPlaceholders(text) {
    const regex = /{[^}]+}|%[sd]/g;
    return text.match(regex) || [];
  }

  function calculateExpansion(source, target) {
    if (!source) return 0;
    return ((target.length - source.length) / source.length) * 100;
  }

  function handleFile() {
    const file = document.getElementById('fileInput').files[0];

    if (!file) {
      alert("Please upload a file.");
      return;
    }

    const reader = new FileReader();

    reader.onload = function(event) {
      try {
        const content = event.target.result;
        const data = JSON.parse(content);

        const results = [];

        // ✅ MOVE HERE (outside loop)
        const issueCounts = {
          missing: 0,
          mismatch: 0,
          expansion: 0
        };

        for (const key in data) {
          const source = data[key].source || "";
          const target = data[key].target || "";

          const sourcePH = extractPlaceholders(source);
          const targetPH = extractPlaceholders(target);

          const missingPH = sourcePH.filter(p => !targetPH.includes(p));
          const extraPH = targetPH.filter(p => !sourcePH.includes(p));

          const expansion = calculateExpansion(source, target).toFixed(1);

          // ✅ SINGLE CLEAN LOGIC FLOW
          if (!target) {
            issueCounts.missing++;
            results.push(`❌ Missing translation for key: ${key}`);
          } else if (missingPH.length > 0 || extraPH.length > 0) {
            issueCounts.mismatch++;
            results.push(`❌ ${key} mismatch → Missing: [${missingPH}] Extra: [${extraPH}]`);
          } else if (source.length > 10 && expansion > 30) {
            issueCounts.expansion++;
            results.push(`⚠️ ${key} expansion high: ${expansion}%`);
          } else if (sourcePH.length > 0) {
            results.push(`⚠️ ${key} placeholders OK: ${sourcePH.join(", ")}`);
          } else {
            results.push(`✅ ${key}`);
          }
        }

        // ✅ SUMMARY GOES HERE
        results.push("\n--- QA SUMMARY ---");
        results.push(`Missing: ${issueCounts.missing}`);
        results.push(`Mismatches: ${issueCounts.mismatch}`);
        results.push(`Expansion Issues: ${issueCounts.expansion}`);

        document.getElementById('output').textContent = results.join('\n');

      } catch (err) {
        document.getElementById('output').textContent = "❌ Invalid JSON format.";
      }
    };

    reader.readAsText(file);
  }
</script>
</body>
</html>
